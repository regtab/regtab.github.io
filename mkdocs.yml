# Configuration for the organization portal site: https://regtab.github.io/
site_name: regtab
site_description: Projects of the regtab research group
site_url: https://regtab.github.io/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  language: en
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.top
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

repo_url: https://github.com/regtab
repo_name: regtab

# The portal is a single-page showcase, so the sidebar navigation is hidden
nav:
  - Projects: index.md

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
